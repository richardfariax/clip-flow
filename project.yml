name: ClipFlow
options:
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: 5.0
    PRODUCT_BUNDLE_IDENTIFIER: com.richadfarias.clipflow
    CODE_SIGN_ENTITLEMENTS: ClipFlow/Resources/ClipFlow.entitlements
    INFOPLIST_FILE: ClipFlow/Resources/Info.plist
    GENERATE_INFOPLIST_FILE: NO
targets:
  ClipFlow:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ClipFlow/App
      - path: ClipFlow/Core
      - path: ClipFlow/UI
      - path: ClipFlow/Resources
        buildPhase: resources
        excludes:
          - Info.plist
          - ClipFlow.entitlements
    settings:
      base:
        PRODUCT_NAME: ClipFlow
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: ClipFlow
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity

  ClipFlowTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ClipFlowTests
    dependencies:
      - target: ClipFlow
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ClipFlow.app/Contents/MacOS/ClipFlow"
        INFOPLIST_FILE: ""
        PRODUCT_NAME: ClipFlowTests
        PRODUCT_BUNDLE_IDENTIFIER: com.richadfarias.clipflow.tests
        GENERATE_INFOPLIST_FILE: YES
