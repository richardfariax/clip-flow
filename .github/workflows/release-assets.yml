name: Build Release Assets

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to upload assets to (e.g. 2.0.0)"
        required: true
        type: string
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: macos-15

    steps:
      - name: Resolve checkout ref
        id: ref
        env:
          RAW_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
        run: |
          set -euo pipefail
          if [[ -z "${RAW_TAG:-}" ]]; then
            echo "Erro: nenhuma tag foi informada." >&2
            exit 1
          fi
          # Tags do ClipFlow usam X.Y.Z (sem prefixo v).
          tag="${RAW_TAG#v}"
          echo "checkout_ref=${tag}" >> "${GITHUB_OUTPUT}"
          echo "raw_tag=${RAW_TAG}" >> "${GITHUB_OUTPUT}"
          echo "Checkout/build na tag: ${tag}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Select Xcode (latest stable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Validate project version matches release tag
        env:
          RAW_TAG: ${{ steps.ref.outputs.raw_tag }}
        run: |
          set -euo pipefail
          chmod +x Scripts/version.sh Scripts/bump_versions.sh Scripts/release.sh Scripts/release_dmg.sh
          ./Scripts/version.sh check
          ./Scripts/version.sh compare-tag "${RAW_TAG}"

      - name: Build release artifacts
        run: |
          ./Scripts/release.sh
          ./Scripts/release_dmg.sh

      - name: Verify built app version
        run: |
          ./Scripts/version.sh verify-app "build/ClipFlow.xcarchive/Products/Applications/ClipFlow.app"

      - name: Resolve target release tag
        id: resolve_tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RAW_TAG: ${{ steps.ref.outputs.raw_tag }}
        run: |
          set -euo pipefail

          tag_name="${RAW_TAG}"
          if [[ "${tag_name}" == v* ]]; then
            alt_tag="${tag_name#v}"
          else
            alt_tag="v${tag_name}"
          fi

          resolve_release_tag() {
            local candidate="$1"
            if gh release view "${candidate}" >/dev/null 2>&1; then
              echo "${candidate}"
              return 0
            fi
            return 1
          }

          find_release_tag() {
            local primary="$1"
            local alternate="$2"
            local candidate=""

            if candidate="$(resolve_release_tag "${primary}")"; then
              echo "${candidate}"
              return 0
            fi
            if candidate="$(resolve_release_tag "${alternate}")"; then
              echo "${candidate}"
              return 0
            fi

            echo "Aguardando publicação da release '${primary}'..." >&2
            for _ in $(seq 1 24); do
              sleep 5
              if candidate="$(resolve_release_tag "${primary}")"; then
                echo "${candidate}"
                return 0
              fi
              if candidate="$(resolve_release_tag "${alternate}")"; then
                echo "${candidate}"
                return 0
              fi
            done
            return 1
          }

          if ! tag_name="$(find_release_tag "${tag_name}" "${alt_tag}")"; then
            echo "Erro: release não encontrada para '${RAW_TAG}' (também testado '${alt_tag}')." >&2
            echo "Releases disponíveis:" >&2
            gh release list --limit 20 >&2
            exit 1
          fi

          echo "resolved_tag=${tag_name}" >> "${GITHUB_OUTPUT}"
          echo "Release alvo: ${tag_name}"

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.resolve_tag.outputs.resolved_tag }}
        run: |
          gh release upload "$TAG_NAME" \
            build/ClipFlow.dmg \
            build/ClipFlow.dmg.sha256 \
            build/ClipFlow.zip \
            build/ClipFlow.zip.sha256 \
            --clobber
