name: Build Release Assets

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to upload assets to (e.g. 1.1.0)"
        required: true
        type: string
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (latest stable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build release artifacts
        run: |
          chmod +x Scripts/release.sh Scripts/release_dmg.sh
          ./Scripts/release.sh
          ./Scripts/release_dmg.sh

      - name: Resolve target release tag
        id: resolve_tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RAW_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
        run: |
          set -euo pipefail

          if [[ -z "${RAW_TAG:-}" ]]; then
            echo "Erro: nenhuma tag foi informada para upload." >&2
            exit 1
          fi

          tag_name="${RAW_TAG}"
          if ! gh release view "${tag_name}" >/dev/null 2>&1; then
            if [[ "${tag_name}" == v* ]]; then
              alt_tag="${tag_name#v}"
            else
              alt_tag="v${tag_name}"
            fi

            if gh release view "${alt_tag}" >/dev/null 2>&1; then
              tag_name="${alt_tag}"
            else
              echo "Erro: release não encontrada para '${RAW_TAG}' (também testado '${alt_tag}')." >&2
              echo "Releases disponíveis:" >&2
              gh release list --limit 20 >&2
              exit 1
            fi
          fi

          echo "resolved_tag=${tag_name}" >> "${GITHUB_OUTPUT}"
          echo "Release alvo: ${tag_name}"

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.resolve_tag.outputs.resolved_tag }}
        run: |
          gh release upload "$TAG_NAME" \
            build/ClipFlow.dmg \
            build/ClipFlow.dmg.sha256 \
            build/ClipFlow.zip \
            build/ClipFlow.zip.sha256 \
            --clobber
